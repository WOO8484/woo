// ── UTILS ──
let _toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on' + (type === 'error' ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('on'), 2400);
}

// ... (기존 escapeHtml, ago, genreCoverClass 등 모든 유틸 함수 유지) ...

// 귀여운 아바타 (중복 제거 후 하나만 유지)
const AVATARS = ['🐱','🐶','🐰','🐻','🦊','🐼','🐨','🐸','🐙','🦄','🐧','🦋','🐬','🦁','🐮','🐯','🐺','🦝','🐴','🐘'];
function getAvatar(nameOrEmail) {
  const str = nameOrEmail || 'A';
  let hash = 0;
  for (const c of str) hash = (hash * 31 + c.charCodeAt(0)) & 0xFFFFFFFF;
  return AVATARS[Math.abs(hash) % AVATARS.length];
}

// 로그인 화면 강제 표시 (가장 중요한 수정)
function forceShowAuth() {
  console.log('🔧 로그인 화면 강제 표시');
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('waitScreen').style.display = 'none';
  document.getElementById('mainNav').style.display = 'none';
  document.getElementById('tabBar').style.display = 'none';
}

// ── AUTH STATE ──
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    console.log('✅ 로그인된 사용자:', user.email);
    await checkApproval(user);
  } else {
    console.log('🔑 로그인 화면 표시');
    showAuth();
  }
});

// 강제 로그인 화면 표시 (Firebase 로드 실패 대비)
window.addEventListener('load', () => {
  setTimeout(() => {
    if (!currentUser && document.getElementById('authScreen').style.display !== 'flex') {
      forceShowAuth();
    }
  }, 1200);
});

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('waitScreen').style.display = 'none';
  document.getElementById('mainNav').style.display    = 'none';
  document.getElementById('tabBar').style.display     = 'none';
  novels = []; isAdmin = false;
}

// ... (나머지 기존 함수들: showApp, checkApproval, loadNovels, renderHome 등 그대로 유지) ...

// 하단 중복 코드 제거 후 window. 함수들만 유지
window.toggleUserMenu = function(e) {
  e.stopPropagation();
  document.getElementById('userMenu').classList.toggle('open');
};
window.closeUserMenu = function() {
  document.getElementById('userMenu').classList.remove('open');
};
document.addEventListener('click', closeUserMenu);

// Service Worker
