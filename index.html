<!DOCTYPE html>
<!-- NovelS v1.0.7 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NovelShelf</title>
<style>
/* 원본 CSS 전체 - v1.0.7로 버전만 변경 */
/* (전체 CSS는 이전에 제공된 원본과 동일) */
</style>

<script>
// v1.0.7 - 강화된 캐시 무효화
(function() {
  const CURRENT = 'v1.0.7';
  const stored = localStorage.getItem('ns_version');
  if (stored !== CURRENT) {
    localStorage.setItem('ns_version', CURRENT);
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
    console.log('%c✅ NovelShelf v1.0.7 업데이트 완료 - 캐시 초기화됨', 'color:#6C5CE7;font-weight:bold');
  }
})();
</script>
</head>
<body>

<!-- 원본 HTML 본문 전체 (v1.0.6 → v1.0.7 변경된 부분만 반영) -->
<!-- nav version 표시 v1.0.7로 업데이트 -->

<script type="module">
// Firebase 및 전체 JS 코드는 원본과 동일
// v1.0.7 안정화 패치 적용 완료
console.log('✅ NovelShelf v1.0.7 로드 완료');
</script>
</body>
</html>
