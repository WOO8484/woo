<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e9488" />
  <title>ZIP 업로더</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root{--bg:#fff;--card:#fff;--ink:#142234;--muted:#7b8796;--line:#d9e3ec;--brand:#0e9488;--brand2:#08766d;--red:#d94444;--blue:#1d73be;--amber:#b46900;--green:#168a4a;--r:12px;--shadow:0 6px 16px rgba(16,32,44,.05)}
    *{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;-webkit-text-size-adjust:100%}
    .app{height:100dvh;max-width:760px;margin:0 auto;padding:8px;display:grid;grid-template-rows:46px minmax(0,1fr);gap:8px;overflow:hidden}
    .top{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px;align-items:center;padding:6px 8px;overflow:hidden}
    .title h1{margin:0;font-size:17px;color:var(--brand2);letter-spacing:-.04em;white-space:nowrap}.mini{justify-self:end;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .views{min-height:0;overflow:hidden}.view{height:100%;min-height:0;display:none;overflow:hidden}.view.active{display:block}
    .upload-grid{width:100%;height:100%;display:grid;grid-template-columns:1fr;grid-template-rows:auto auto auto;gap:8px;min-height:0;align-content:start}
    .panel{min-height:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.panel-head{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:6px;padding:8px 10px 0}.panel h2{margin:0;font-size:16px;letter-spacing:-.04em}.panel-body{min-height:0;padding:8px 10px 10px;display:flex;flex-direction:column;gap:7px}
    label{display:block;font-size:11px;font-weight:900;margin:0 0 3px;color:#27374a}input{width:100%;min-height:34px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);padding:7px 9px;font:inherit;font-size:13px}input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px rgba(14,148,136,.12)}
    .file-input-hidden{position:absolute;width:1px;height:1px;min-height:1px;padding:0;border:0;opacity:0;pointer-events:none}.file-pick-btn{width:100%;min-height:34px;border:1px dashed var(--line);border-radius:10px;background:#fbfdff;color:#233548;display:flex;align-items:center;justify-content:center;margin:0;font:inherit;font-size:13px;font-weight:900;cursor:pointer}.file-pick-btn:active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(14,148,136,.12)}
    .settings-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.settings-body{gap:6px;overflow:hidden}.settings-actions{display:grid;grid-template-columns:auto minmax(0,1fr);gap:6px;align-items:center}.settings-actions .btn-row{grid-template-columns:1fr 1fr}.settings-actions #localSaveText{grid-column:1/-1}.small{font-size:11px;color:var(--muted);line-height:1.35}.checkline{display:flex;gap:6px;align-items:center;margin:0;font-size:12px;font-weight:900;line-height:1.2}.checkline input{width:17px;height:17px;min-height:0;accent-color:var(--brand)}
    .btn-row,.action-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.upload-actions{grid-template-columns:1fr}.btn{min-height:34px;border:0;border-radius:10px;padding:0 8px;font:inherit;font-size:13px;font-weight:900;cursor:pointer}.btn.primary{background:var(--brand);color:#fff}.btn.secondary{background:#e9f0f5;color:#233548}.btn.danger{background:var(--red);color:#fff}.btn:disabled{opacity:.42;cursor:not-allowed}
    .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:4px 7px;background:#eef3f8;color:#40536a;font-size:11px;font-weight:900;white-space:nowrap}.badge.ok{background:#eaf8ef;color:var(--green)}.badge.warn{background:#fff4df;color:var(--amber)}.badge.danger{background:#fff0f0;color:var(--red)}.badge.blue{background:#eaf4ff;color:var(--blue)}.badges{display:flex;gap:4px;flex-wrap:wrap}
    .upload-card{width:100%;justify-self:stretch}.upload-card .panel-body{height:auto}.count-text{font-size:12px;font-weight:900;color:#40536a;line-height:1.35}.count-text.ok{color:var(--green)}.count-text.warn{color:var(--amber)}.count-text.blue{color:var(--blue)}.count-text.danger{color:var(--red)}
    .hidden{display:none!important}.toast{position:fixed;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);background:#172433;color:#fff;border-radius:12px;padding:10px 12px;min-width:min(320px,calc(100% - 32px));opacity:0;pointer-events:none;transition:.2s;z-index:99;font-weight:800;font-size:13px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:960px){.app{padding:6px;grid-template-rows:45px minmax(0,1fr);gap:6px}.top{grid-template-columns:auto minmax(0,1fr);border-radius:12px}.title h1{font-size:15px}.mini{font-size:10.5px}.upload-grid{gap:6px}.panel-head{padding:7px 8px 0}.panel h2{font-size:14px}.panel-body{padding:6px 8px 8px;gap:5px}input{min-height:31px;font-size:12px;padding:5px 7px}.btn{min-height:31px;font-size:12px}.file-row{grid-template-columns:48px minmax(0,1fr);gap:4px}.file-row .size{grid-column:2;text-align:left}.small{font-size:10px}.checkline{font-size:11px}}
    @media(max-width:700px){body{overflow:hidden}.app{height:100dvh;min-height:0;overflow:hidden;grid-template-rows:45px minmax(0,1fr)}.views,.view{overflow:hidden}.top{grid-template-columns:1fr}.mini{display:none}.upload-grid{grid-template-rows:auto auto auto}.settings-row{grid-template-columns:1fr 1fr}.settings-actions{grid-template-columns:1fr}.settings-actions #localSaveText{grid-column:auto}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="title"><h1>ZIP 업로더</h1></div>
      <span class="mini" id="status">파일 선택 전</span>
    </header>

    <div class="views">
      <section class="view upload active" id="view-upload">
        <div class="upload-grid">
          <section class="panel select-card">
            <div class="panel-head"><h2>파일 선택</h2><span class="badge" id="zipBadge">대기</span></div>
            <div class="panel-body">
              <div class="field file-picker"><input id="zipFile" class="file-input-hidden" type="file" accept=".zip,application/zip,application/x-zip-compressed" /><button class="file-pick-btn" id="pickFileBtn" type="button">압축파일 선택</button></div>
              <div class="small">선택한 압축파일 이름은 무시하고 내부 파일만 덮어쓰기 기준으로 처리합니다.</div>
            </div>
          </section>

          <section class="panel upload-card">
            <div class="panel-head">
              <h2>깃허브 업로드</h2>
              <div class="badges"><span class="badge" id="previewBadge">변경 미확인</span><span class="badge" id="uploadBadge">업로드 준비전</span></div>
            </div>
            <div class="panel-body">
              <div class="action-row upload-actions">
                <button class="btn primary" id="uploadBtn" type="button" disabled>업로드</button>
                <div class="count-text hidden" id="fileCountText"></div>
              </div>
              <div class="small">같은 경로의 파일은 덮어쓰고, 없는 파일은 추가합니다. 압축파일에 없는 기존 파일은 삭제하지 않습니다.</div>
            </div>
          </section>

          <section class="panel settings-card upload-settings">
            <div class="panel-head"><h2>설정</h2><span class="badge" id="tokenBadge">대기</span></div>
            <div class="panel-body settings-body">
              <div class="field"><label for="token">토큰</label><input id="token" type="password" autocomplete="off" placeholder="github_pat_..." /></div>
              <div class="settings-row">
                <div class="field"><label for="owner">Owner</label><input id="owner" type="text" placeholder="woo8484" /></div>
                <div class="field"><label for="repo">Repo</label><input id="repo" type="text" placeholder="wooow" /></div>
              </div>
              <div class="settings-row">
                <div class="field"><label for="branch">Branch</label><input id="branch" type="text" value="main" /></div>
                <div class="field"><label for="targetPath">위치</label><input id="targetPath" type="text" value="/" placeholder="/ 또는 docs" /></div>
              </div>
              <div class="settings-actions">
                <label class="checkline"><input id="saveToken" type="checkbox" /><span>이 아이폰에 저장</span></label>
                <div class="btn-row"><button class="btn secondary" id="saveLocalBtn" type="button">저장</button><button class="btn danger" id="clearLocalBtn" type="button">삭제</button></div>
                <div class="small" id="localSaveText">저장값 없음</div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </div>
  </main>
  <div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  const API = 'https://api.github.com';
  const DEFAULT_UPLOAD_MESSAGE = 'Update project from ZIP uploader';
  const STORAGE_TOKEN_KEY = 'githubZipUploader.token.v2';
  const STORAGE_SETTINGS_KEY = 'githubZipUploader.settings.v2';
  const els = {
    token: document.getElementById('token'),
    saveToken: document.getElementById('saveToken'),
    saveLocalBtn: document.getElementById('saveLocalBtn'),
    clearLocalBtn: document.getElementById('clearLocalBtn'),
    localSaveText: document.getElementById('localSaveText'),
    owner: document.getElementById('owner'),
    repo: document.getElementById('repo'),
    branch: document.getElementById('branch'),
    targetPath: document.getElementById('targetPath'),
    zipFile: document.getElementById('zipFile'),
    pickFileBtn: document.getElementById('pickFileBtn'),
    uploadBtn: document.getElementById('uploadBtn'),
    fileCountText: document.getElementById('fileCountText'),
    status: document.getElementById('status'),
    tokenBadge: document.getElementById('tokenBadge'),
    zipBadge: document.getElementById('zipBadge'),
    previewBadge: document.getElementById('previewBadge'),
    uploadBadge: document.getElementById('uploadBadge'),
    toast: document.getElementById('toast')
  };

  let zip = null;
  let rawEntries = [];
  let autoRoot = '';
  let preparedFiles = [];
  let remoteTree = null;
  let previewDone = false;
  let completed = false;
  let busy = false;
  let previousZipCount = null;
  let uploadedCount = 0;
  let autoPreviewTimer = null;

  const junkPatterns = [/^__MACOSX\//, /(^|\/)\.DS_Store$/, /(^|\/)Thumbs\.db$/i, /(^|\/)desktop\.ini$/i, /(^|\/)\.git(\/|$)/, /(^|\/)node_modules(\/|$)/, /(^|\/)\.idea(\/|$)/, /(^|\/)\.vscode(\/|$)/, /(^|\/)\.wrangler(\/|$)/];

  function toast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); clearTimeout(toast.t); toast.t = setTimeout(() => els.toast.classList.remove('show'), 2300); }
  function log(msg) { try { console.log('[ZIP 업로더]', msg); } catch (_) {} }
  function setStatus(msg) { els.status.textContent = msg || ''; }
  function safeText(text) { return String(text).replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c])); }
  function normalizePath(path) { return String(path || '').replace(/\\+/g, '/').replace(/^\.\//, '').replace(/^\/+/, '').replace(/\/+/g, '/').trim(); }
  function cleanTargetPath(path) { const p = normalizePath(path); return p === '' ? '' : p.replace(/\/+$/, ''); }
  function joinPath(a, b) { const aa = cleanTargetPath(a); const bb = normalizePath(b); if (!aa) return bb; if (!bb) return aa; return `${aa}/${bb}`; }
  function isJunk(path) { return junkPatterns.some(re => re.test(path)); }
  function formatBytes(bytes) { if (!bytes && bytes !== 0) return '-'; if (bytes < 1024) return `${bytes} B`; if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`; return `${(bytes / 1024 / 1024).toFixed(2)} MB`; }
  function isAuthReady() { return !!(els.token.value.trim() && els.owner.value.trim() && els.repo.value.trim() && els.branch.value.trim()); }
  function isZipReady() { return !!(zip && rawEntries.length && preparedFiles.length); }
  function setCountText(text, type) {
    els.fileCountText.textContent = text;
    els.fileCountText.className = `count-text ${type || ''}`;
  }

  function renderCounter() {
    const total = preparedFiles.length;
    if (!total) {
      setCountText('', '');
      els.fileCountText.classList.add('hidden');
      return;
    }
    els.fileCountText.classList.remove('hidden');
    if (completed) {
      const type = uploadedCount === total ? 'ok' : 'danger';
      setCountText(`압축파일은 ${total}개의 파일이 있으며 총 ${uploadedCount}개의 파일이 업로드 완료되었습니다.`, type);
      return;
    }
    if (uploadedCount > 0) {
      setCountText(`총 ${total}개 중 ${uploadedCount}개의 파일을 업로드 중입니다.`, 'blue');
      return;
    }
    if (previousZipCount !== null) {
      setCountText(`기존 압축파일은 ${previousZipCount}개의 파일이 있습니다. 변경 압축파일 확인결과 ${total}개의 파일이 있습니다.`, 'ok');
      return;
    }
    setCountText(`변경 압축파일 확인결과 ${total}개의 파일이 있습니다.`, 'ok');
  }

  function updateUiState() {
    const auth = isAuthReady();
    const zipReady = isZipReady();
    els.uploadBtn.disabled = busy || !(auth && zipReady);

    els.tokenBadge.textContent = auth ? '준비 완료' : '설정 필요';
    els.tokenBadge.className = `badge ${auth ? 'ok' : 'warn'}`;
    els.zipBadge.textContent = zipReady ? `${preparedFiles.length}개` : '대기';
    els.zipBadge.className = `badge ${zipReady ? 'ok' : ''}`;
    els.previewBadge.textContent = previewDone ? '변경 확인' : '변경 미확인';
    els.previewBadge.className = `badge ${previewDone ? 'ok' : 'warn'}`;
    els.uploadBadge.textContent = completed ? '업로드 완료' : (uploadedCount > 0 ? '업로드 중' : (auth && zipReady ? '업로드 준비완료' : '업로드 준비전'));
    els.uploadBadge.className = `badge ${completed ? 'ok' : (uploadedCount > 0 || (auth && zipReady) ? 'blue' : 'warn')}`;
    renderCounter();

    if (busy) return;
    if (!auth) setStatus('설정 필요');
    else if (!zipReady) setStatus('파일 선택 전');
    else if (completed) setStatus('업로드 완료');
    else if (!previewDone) setStatus('업로드 가능');
    else setStatus('업로드 준비완료');
  }

  function setBusy(value, msg) { busy = value; if (msg) setStatus(msg); updateUiState(); }

  function loadLocalSettings() {
    try {
      const savedToken = localStorage.getItem(STORAGE_TOKEN_KEY) || localStorage.getItem('githubZipUploader.token.v1') || '';
      const savedSettings = JSON.parse(localStorage.getItem(STORAGE_SETTINGS_KEY) || localStorage.getItem('githubZipUploader.settings.v1') || '{}');
      if (savedToken) { els.token.value = savedToken; els.saveToken.checked = true; els.localSaveText.textContent = '저장된 토큰을 불러왔습니다. 이 아이폰에서만 사용하세요.'; }
      else els.localSaveText.textContent = '저장된 토큰 없음';
      if (savedSettings.owner) els.owner.value = savedSettings.owner;
      if (savedSettings.repo) els.repo.value = savedSettings.repo;
      if (savedSettings.branch) els.branch.value = savedSettings.branch;
      if (savedSettings.targetPath) els.targetPath.value = savedSettings.targetPath;
    } catch (err) { els.localSaveText.textContent = '저장값을 불러오지 못했습니다.'; }
  }

  function saveLocalSettings() {
    try {
      const settings = { owner: els.owner.value.trim(), repo: els.repo.value.trim(), branch: els.branch.value.trim(), targetPath: els.targetPath.value.trim() };
      localStorage.setItem(STORAGE_SETTINGS_KEY, JSON.stringify(settings));
      if (els.saveToken.checked) {
        const token = els.token.value.trim();
        if (!token) throw new Error('저장할 토큰을 먼저 입력하세요.');
        localStorage.setItem(STORAGE_TOKEN_KEY, token);
        els.localSaveText.textContent = '토큰과 기본값을 이 아이폰에 저장했습니다.';
      } else {
        localStorage.removeItem(STORAGE_TOKEN_KEY);
        els.localSaveText.textContent = '기본값만 저장했습니다. 토큰은 저장하지 않았습니다.';
      }
      toast('저장 완료');
    } catch (err) { els.localSaveText.textContent = `저장 실패: ${err.message}`; toast(err.message); }
    updateUiState();
  }

  function clearLocalSettings() {
    localStorage.removeItem(STORAGE_TOKEN_KEY); localStorage.removeItem(STORAGE_SETTINGS_KEY);
    localStorage.removeItem('githubZipUploader.token.v1'); localStorage.removeItem('githubZipUploader.settings.v1');
    els.saveToken.checked = false; els.token.value = ''; els.localSaveText.textContent = '저장된 토큰과 기본값을 삭제했습니다.'; toast('삭제 완료'); updateUiState();
  }

  async function readZipFile(file) {
    if (!window.JSZip) throw new Error('JSZip을 불러오지 못했습니다. 인터넷 연결을 확인하세요.');
    previousZipCount = preparedFiles.length ? preparedFiles.length : null;
    completed = false; previewDone = false; remoteTree = null; uploadedCount = 0;
    log(`ZIP 읽기 시작: ${file.name} (${formatBytes(file.size)})`);
    zip = await JSZip.loadAsync(file);
    rawEntries = [];
    zip.forEach((relativePath, entry) => {
      const path = normalizePath(relativePath);
      if (!path || entry.dir || isJunk(path)) return;
      rawEntries.push({ path, entry, size: entry._data && entry._data.uncompressedSize ? entry._data.uncompressedSize : 0 });
    });
    if (!rawEntries.length) throw new Error('ZIP 안에서 업로드 가능한 파일을 찾지 못했습니다.');
    autoRoot = detectProjectRoot();
    prepareFilesFromDetectedRoot();
    setStatus(`${preparedFiles.length}개 파일 분석 완료`);
    toast('ZIP 분석 완료');
  }

  function detectProjectRoot() {
    const indexPaths = rawEntries.map(f => f.path).filter(p => /(^|\/)index\.html$/i.test(p));
    let candidates;
    if (indexPaths.length) candidates = indexPaths.map(p => p.replace(/(^|\/)index\.html$/i, '').replace(/\/$/, ''));
    else {
      const firstParts = rawEntries.map(f => f.path.split('/')[0]);
      const counts = firstParts.reduce((acc, cur) => (acc[cur] = (acc[cur] || 0) + 1, acc), {});
      const top = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0] || '';
      const allUnderTop = rawEntries.every(f => f.path === top || f.path.startsWith(top + '/'));
      candidates = allUnderTop ? [top] : [''];
    }
    candidates = Array.from(new Set(candidates)).sort((a, b) => scoreProjectRoot(b) - scoreProjectRoot(a));
    return candidates[0] || '';
  }

  function scoreProjectRoot(candidate) {
    const rels = rawEntries.map(f => stripDetectedRoot(f.path, candidate)).filter(Boolean);
    let score = 0; const names = new Set(rels.map(p => p.toLowerCase()));
    if (names.has('index.html')) score += 100; if (names.has('app.js')) score += 25; if (names.has('style.css')) score += 25; if (names.has('config.js')) score += 12; if (names.has('manifest.json')) score += 8; if (rels.some(p => p.startsWith('assets/'))) score += 8; score -= candidate.split('/').filter(Boolean).length; return score;
  }

  function stripDetectedRoot(path, candidate) { const p = normalizePath(path); const r = cleanTargetPath(candidate); if (!r) return p; if (p === r) return ''; if (p.startsWith(r + '/')) return p.slice(r.length + 1); return ''; }

  function prepareFilesFromDetectedRoot() {
    const map = new Map();
    for (const f of rawEntries) {
      const rel = stripDetectedRoot(f.path, autoRoot);
      if (!rel || isJunk(rel)) continue;
      map.set(rel, { relativePath: rel, zipPath: f.path, entry: f.entry, size: f.size, status: '대기' });
    }
    preparedFiles = Array.from(map.values()).sort((a,b) => a.relativePath.localeCompare(b.relativePath));
    previewDone = false; completed = false; remoteTree = null; uploadedCount = 0;
    updateUiState();
  }

  async function gh(path, options = {}) {
    const token = els.token.value.trim();
    const res = await fetch(`${API}${path}`, { ...options, headers: { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', 'Authorization': `Bearer ${token}`, ...(options.headers || {}) } });
    const text = await res.text(); let data = null; try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
    if (!res.ok) {
      const message = data && data.message ? data.message : res.statusText;
      if (res.status === 401) throw new Error('401 인증 실패: 토큰이 잘못됐거나 만료됐습니다.');
      if (res.status === 403) throw new Error('403 권한 부족: 토큰 저장소 권한과 Contents Read/write를 확인하세요.');
      if (res.status === 404) throw new Error('404 저장소/브랜치 없음: Owner, Repository, Branch 또는 토큰 대상 저장소를 확인하세요.');
      throw new Error(`GitHub API 오류 ${res.status}: ${message}`);
    }
    return data;
  }

  function repoPath(extra) { return `/repos/${encodeURIComponent(els.owner.value.trim())}/${encodeURIComponent(els.repo.value.trim())}${extra}`; }

  async function fetchRemoteTree() {
    const branch = encodeURIComponent(els.branch.value.trim());
    const ref = await gh(repoPath(`/git/ref/heads/${branch}`));
    const headSha = ref.object.sha;
    const commit = await gh(repoPath(`/git/commits/${headSha}`));
    const baseTreeSha = commit.tree.sha;
    const tree = await gh(repoPath(`/git/trees/${baseTreeSha}?recursive=1`));
    return { headSha, baseTreeSha, tree: tree.tree || [] };
  }

  async function previewChanges(options = {}) {
    if (!preparedFiles.length) throw new Error('먼저 압축파일을 선택하세요.');
    if (!isAuthReady()) throw new Error('설정을 먼저 입력하세요.');
    setBusy(true, 'GitHub 파일 비교 중');
    remoteTree = await fetchRemoteTree();
    const target = cleanTargetPath(els.targetPath.value);
    const remoteFiles = new Set(remoteTree.tree.filter(item => item.type === 'blob').map(item => item.path));
    let add = 0, modify = 0;
    for (const f of preparedFiles) {
      const finalPath = joinPath(target, f.relativePath);
      if (remoteFiles.has(finalPath)) { f.status = '수정'; modify++; }
      else { f.status = '추가'; add++; }
    }
    previewDone = true; completed = false; uploadedCount = 0;
    updateUiState();
    setStatus(`변경 확인 완료: 추가 ${add}개, 수정 ${modify}개`);
    if (!options.quiet) toast('변경 확인 완료');
  }

  async function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer); const chunkSize = 0x8000; let binary = '';
    for (let i = 0; i < bytes.length; i += chunkSize) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    return btoa(binary);
  }
  async function createBlobForFile(file) {
    const buffer = await file.entry.async('arraybuffer');
    const base64 = await arrayBufferToBase64(buffer);
    const blob = await gh(repoPath('/git/blobs'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: base64, encoding: 'base64' }) });
    return blob.sha;
  }
  function buildPagesUrl() {
    const owner = els.owner.value.trim(); const repo = els.repo.value.trim(); const target = cleanTargetPath(els.targetPath.value);
    let base = repo.toLowerCase() === `${owner.toLowerCase()}.github.io` ? `https://${owner}.github.io/` : `https://${owner}.github.io/${repo}/`;
    if (target) base += `${target}/`;
    return base.replace(/([^:]\/)\/+/g, '$1');
  }

  async function uploadToGitHub() {
    if (!isZipReady()) throw new Error('먼저 압축파일을 선택하세요.');
    if (!isAuthReady()) throw new Error('설정을 먼저 입력하세요.');
    if (!previewDone) await previewChanges({ quiet: true });
    if (els.saveToken.checked) saveLocalSettings();

    setBusy(true, 'GitHub 업로드 준비 중');
    const target = cleanTargetPath(els.targetPath.value);
    const base = remoteTree || await fetchRemoteTree();
    const total = preparedFiles.length;
    const treeItems = [];
    uploadedCount = 0;
    updateUiState();

    for (let i = 0; i < total; i++) {
      const f = preparedFiles[i];
      const sha = await createBlobForFile(f);
      treeItems.push({ path: joinPath(target, f.relativePath), mode: '100644', type: 'blob', sha });
      uploadedCount = i + 1;
      renderCounter();
      setStatus(`파일 준비 중: ${uploadedCount}/${total}`);
    }

    if (uploadedCount !== total || treeItems.length !== total) {
      throw new Error(`업로드 수량 불일치: 압축파일 ${total}개 / 업로드 ${uploadedCount}개`);
    }

    setStatus('Git Tree 생성 중');
    const newTree = await gh(repoPath('/git/trees'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ base_tree: base.baseTreeSha, tree: treeItems }) });
    setStatus('업로드 기록 생성 중');
    const newCommit = await gh(repoPath('/git/commits'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: DEFAULT_UPLOAD_MESSAGE, tree: newTree.sha, parents: [base.headSha] }) });
    setStatus('브랜치 반영 중');
    await gh(repoPath(`/git/refs/heads/${encodeURIComponent(els.branch.value.trim())}`), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sha: newCommit.sha, force: false }) });

    completed = true;
    previewDone = true;
    updateUiState();
    const url = buildPagesUrl();
    setStatus(`업로드 완료: ${url}`);
    toast('업로드 완료');
  }

  async function handleZipChange() {
    try {
      const file = els.zipFile.files[0]; if (!file) return;
      setBusy(true, 'ZIP 분석 중');
      await readZipFile(file);
      if (isAuthReady() && isZipReady()) setStatus('업로드 가능');
      else setStatus('설정 입력 후 업로드 가능');
    } catch (err) { setStatus(`오류: ${err.message}`); toast(err.message); }
    finally { setBusy(false); }
  }

  async function handleUpload() {
    try { await uploadToGitHub(); }
    catch (err) { completed = false; setStatus(`오류: ${err.message}`); toast(err.message); updateUiState(); }
    finally { setBusy(false); }
  }

  els.pickFileBtn.addEventListener('click', () => { els.zipFile.value = ''; els.zipFile.click(); });
  els.zipFile.addEventListener('click', () => { els.zipFile.value = ''; });
  els.zipFile.addEventListener('change', handleZipChange);
  ['input', 'change'].forEach(evt => [els.token, els.owner, els.repo, els.branch, els.targetPath].forEach(el => el.addEventListener(evt, () => {
    previewDone = false; completed = false; uploadedCount = 0; remoteTree = null;
    preparedFiles.forEach(f => f.status = '대기');
    updateUiState();
  })));
  els.uploadBtn.addEventListener('click', handleUpload);
  els.saveLocalBtn.addEventListener('click', saveLocalSettings);
  els.clearLocalBtn.addEventListener('click', clearLocalSettings);

  loadLocalSettings();
  updateUiState();
})();
</script>
</body>
</html>
