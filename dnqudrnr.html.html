<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e9488" />
  <title>ZIP 업로더 - 다중 게시판</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root{--bg:#fff;--card:#fff;--ink:#142234;--muted:#7b8796;--line:#d9e3ec;--brand:#0e9488;--brand2:#08766d;--red:#d94444;--blue:#1d73be;--amber:#b46900;--green:#168a4a;--r:12px;--shadow:0 6px 16px rgba(16,32,44,.05)}
    *{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;-webkit-text-size-adjust:100%}
    button,input,select{font:inherit}.app{height:100dvh;max-width:760px;margin:0 auto;padding:8px;display:grid;grid-template-rows:46px minmax(0,1fr);gap:8px;overflow:hidden}
    .top{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px;align-items:center;padding:6px 8px;overflow:hidden}
    .title h1{margin:0;font-size:17px;color:var(--brand2);letter-spacing:-.04em;white-space:nowrap}.mini{justify-self:end;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .views,.view{height:100%;min-height:0;overflow:hidden}.upload-grid{width:100%;height:100%;display:grid;grid-template-columns:1fr;grid-auto-rows:max-content;gap:8px;min-height:0;align-content:start;overflow:auto;padding-bottom:max(8px,env(safe-area-inset-bottom));overscroll-behavior:contain}
    .panel{min-height:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.panel-head{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:6px;padding:8px 10px 0}.panel h2{margin:0;font-size:16px;letter-spacing:-.04em}.panel-body{min-height:0;padding:8px 10px 10px;display:flex;flex-direction:column;gap:7px}
    label{display:block;font-size:11px;font-weight:900;margin:0 0 3px;color:#27374a}input,select{width:100%;min-height:34px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);padding:7px 9px;font-size:13px}input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px rgba(14,148,136,.12)}input:disabled,select:disabled{background:#f4f7f9;color:#8d98a5}
    .file-input-hidden{position:absolute;width:1px;height:1px;min-height:1px;padding:0;border:0;opacity:0;pointer-events:none}.file-pick-btn{width:100%;min-height:34px;border:1px dashed var(--line);border-radius:10px;background:#fbfdff;color:#233548;display:flex;align-items:center;justify-content:center;margin:0;font-size:13px;font-weight:900;cursor:pointer}.file-pick-btn:active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(14,148,136,.12)}
    .settings-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.profile-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px}.profile-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.settings-body{gap:6px}.settings-actions{display:grid;grid-template-columns:auto minmax(0,1fr);gap:6px;align-items:center}.settings-actions .btn-row{grid-template-columns:1fr 1fr}.settings-actions #localSaveText{grid-column:1/-1}.small{font-size:11px;color:var(--muted);line-height:1.4}.notice{border-radius:9px;background:#f3f8fb;padding:7px 8px}.checkline{display:flex;gap:6px;align-items:center;margin:0;font-size:12px;font-weight:900;line-height:1.2}.checkline input{width:17px;height:17px;min-height:0;accent-color:var(--brand)}
    .btn-row,.action-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.upload-actions{grid-template-columns:minmax(0,1fr) auto}.btn{min-height:34px;border:0;border-radius:10px;padding:0 10px;font-size:13px;font-weight:900;cursor:pointer;white-space:nowrap}.btn.primary{background:var(--brand);color:#fff}.btn.secondary{background:#e9f0f5;color:#233548}.btn.danger{background:var(--red);color:#fff}.btn.compact{min-width:72px}.btn:disabled{opacity:.42;cursor:not-allowed}
    .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:4px 7px;background:#eef3f8;color:#40536a;font-size:11px;font-weight:900;white-space:nowrap}.badge.ok{background:#eaf8ef;color:var(--green)}.badge.warn{background:#fff4df;color:var(--amber)}.badge.danger{background:#fff0f0;color:var(--red)}.badge.blue{background:#eaf4ff;color:var(--blue)}.badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
    .count-text{font-size:12px;font-weight:900;color:#40536a;line-height:1.35}.count-text.ok{color:var(--green)}.count-text.warn{color:var(--amber)}.count-text.blue{color:var(--blue)}.count-text.danger{color:var(--red)}
    .progress{height:8px;border-radius:999px;background:#edf2f5;overflow:hidden}.progress>span{display:block;height:100%;width:0;background:var(--brand);transition:width .18s ease}.hidden{display:none!important}.toast{position:fixed;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);background:#172433;color:#fff;border-radius:12px;padding:10px 12px;min-width:min(320px,calc(100% - 32px));opacity:0;pointer-events:none;transition:.2s;z-index:99;font-weight:800;font-size:13px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:960px){.app{padding:6px;grid-template-rows:45px minmax(0,1fr);gap:6px}.top{border-radius:12px}.title h1{font-size:15px}.mini{font-size:10.5px}.upload-grid{gap:6px}.panel-head{padding:7px 8px 0}.panel h2{font-size:14px}.panel-body{padding:6px 8px 8px;gap:5px}input,select{min-height:31px;font-size:12px;padding:5px 7px}.btn,.file-pick-btn{min-height:31px;font-size:12px}.small{font-size:10px}.checkline{font-size:11px}}
    @media(max-width:700px){.top{grid-template-columns:1fr}.mini{display:none}.settings-row{grid-template-columns:1fr 1fr}.settings-actions{grid-template-columns:1fr}.settings-actions #localSaveText{grid-column:auto}.upload-actions{grid-template-columns:1fr}.profile-actions{grid-template-columns:1fr 1fr 1fr}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="title"><h1>ZIP 업로더 · 다중 게시판</h1></div>
      <span class="mini" id="status">복구 상태 확인 중</span>
    </header>

    <div class="views">
      <section class="view upload" id="view-upload">
        <div class="upload-grid">
          <section class="panel settings-card">
            <div class="panel-head"><h2>게시판 선택</h2><span class="badge" id="profileBadge">1개</span></div>
            <div class="panel-body settings-body">
              <div class="profile-row">
                <select id="profileSelect" aria-label="게시판 선택"></select>
                <button class="btn secondary compact" id="newProfileBtn" type="button">추가</button>
              </div>
              <div class="field"><label for="profileName">게시판 이름</label><input id="profileName" type="text" placeholder="예: 메인 블로그" /></div>
              <div class="profile-actions">
                <button class="btn primary" id="saveProfileBtn" type="button">현재 저장</button>
                <button class="btn secondary" id="duplicateProfileBtn" type="button">복제</button>
                <button class="btn danger" id="deleteProfileBtn" type="button">삭제</button>
              </div>
            </div>
          </section>

          <section class="panel select-card">
            <div class="panel-head"><h2>파일 선택</h2><span class="badge" id="zipBadge">대기</span></div>
            <div class="panel-body">
              <input id="zipFile" class="file-input-hidden" type="file" accept=".zip,application/zip,application/x-zip-compressed" />
              <button class="file-pick-btn" id="pickFileBtn" type="button">압축파일 선택</button>
              <div class="small" id="fileInfo">ZIP 내부의 폴더와 파일 경로를 그대로 유지합니다.</div>
            </div>
          </section>

          <section class="panel upload-card">
            <div class="panel-head">
              <h2>깃허브 업로드</h2>
              <div class="badges"><span class="badge" id="previewBadge">변경 미확인</span><span class="badge" id="uploadBadge">준비 전</span></div>
            </div>
            <div class="panel-body">
              <div class="action-row upload-actions">
                <button class="btn primary" id="uploadBtn" type="button" disabled>업로드</button>
                <button class="btn secondary" id="clearJobBtn" type="button">작업 초기화</button>
              </div>
              <div class="progress hidden" id="progressTrack"><span id="progressBar"></span></div>
              <div class="count-text hidden" id="fileCountText"></div>
              <div class="small notice">다른 탭이나 앱으로 전환해도 페이지가 살아 있으면 계속 진행합니다. iPhone이 페이지를 중단하거나 새로고침해도 ZIP과 파일별 진행 기록을 복구해 이어서 처리합니다. 브라우저를 강제 종료하거나 iOS가 저장공간을 정리한 경우에는 복구가 제한될 수 있습니다.</div>
            </div>
          </section>

          <section class="panel settings-card upload-settings">
            <div class="panel-head"><h2>현재 게시판 설정</h2><span class="badge" id="tokenBadge">설정 필요</span></div>
            <div class="panel-body settings-body">
              <div class="field"><label for="token">토큰</label><input id="token" type="password" autocomplete="off" placeholder="github_pat_..." /></div>
              <div class="settings-row">
                <div class="field"><label for="owner">Owner</label><input id="owner" type="text" placeholder="woo8484" /></div>
                <div class="field"><label for="repo">Repo</label><input id="repo" type="text" placeholder="TEST" /></div>
              </div>
              <div class="settings-row">
                <div class="field"><label for="branch">Branch</label><input id="branch" type="text" value="main" /></div>
                <div class="field"><label for="targetPath">위치</label><input id="targetPath" type="text" value="/" placeholder="/ 또는 docs" /></div>
              </div>
              <div class="settings-actions">
                <label class="checkline"><input id="saveToken" type="checkbox" /><span>이 기기에 토큰 저장</span></label>
                <div class="btn-row"><button class="btn secondary" id="saveLocalBtn" type="button">설정 저장</button><button class="btn danger" id="clearTokenBtn" type="button">토큰 삭제</button></div>
                <div class="small" id="localSaveText">게시판마다 서로 다른 토큰을 저장할 수 있습니다.</div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </div>
  </main>
  <div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  const API = 'https://api.github.com';
  const DEFAULT_UPLOAD_MESSAGE = 'Update project from ZIP uploader';
  const PROFILES_KEY = 'githubZipUploader.profiles.v4';
  const ACTIVE_PROFILE_KEY = 'githubZipUploader.activeProfile.v4';
  const DB_NAME = 'githubZipUploader.v4';
  const DB_VERSION = 1;
  const DB_STORE = 'jobs';
  const ACTIVE_JOB_ID = 'active-upload';

  const els = {
    profileSelect: document.getElementById('profileSelect'), profileName: document.getElementById('profileName'),
    newProfileBtn: document.getElementById('newProfileBtn'), saveProfileBtn: document.getElementById('saveProfileBtn'),
    duplicateProfileBtn: document.getElementById('duplicateProfileBtn'), deleteProfileBtn: document.getElementById('deleteProfileBtn'),
    profileBadge: document.getElementById('profileBadge'), token: document.getElementById('token'), saveToken: document.getElementById('saveToken'),
    saveLocalBtn: document.getElementById('saveLocalBtn'), clearTokenBtn: document.getElementById('clearTokenBtn'), localSaveText: document.getElementById('localSaveText'),
    owner: document.getElementById('owner'), repo: document.getElementById('repo'), branch: document.getElementById('branch'), targetPath: document.getElementById('targetPath'),
    zipFile: document.getElementById('zipFile'), pickFileBtn: document.getElementById('pickFileBtn'), fileInfo: document.getElementById('fileInfo'),
    uploadBtn: document.getElementById('uploadBtn'), clearJobBtn: document.getElementById('clearJobBtn'), fileCountText: document.getElementById('fileCountText'),
    progressTrack: document.getElementById('progressTrack'), progressBar: document.getElementById('progressBar'), status: document.getElementById('status'),
    tokenBadge: document.getElementById('tokenBadge'), zipBadge: document.getElementById('zipBadge'), previewBadge: document.getElementById('previewBadge'),
    uploadBadge: document.getElementById('uploadBadge'), toast: document.getElementById('toast')
  };

  let profiles = [];
  let activeProfileId = '';
  let zip = null;
  let zipBlob = null;
  let zipFileName = '';
  let rawEntries = [];
  let preparedFiles = [];
  let remoteTree = null;
  let previewDone = false;
  let completed = false;
  let busy = false;
  let uploadedCount = 0;
  let blobShas = {};
  let jobStatus = 'none';
  let wakeLock = null;
  let autoResumeRequested = false;
  let dbPromise = null;

  const junkPatterns = [/^__MACOSX\//, /(^|\/)\.DS_Store$/, /(^|\/)Thumbs\.db$/i, /(^|\/)desktop\.ini$/i, /(^|\/)\.git(\/|$)/, /(^|\/)node_modules(\/|$)/, /(^|\/)\.idea(\/|$)/, /(^|\/)\.vscode(\/|$)/, /(^|\/)\.wrangler(\/|$)/];

  function toast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); clearTimeout(toast.t); toast.t = setTimeout(() => els.toast.classList.remove('show'), 2400); }
  function setStatus(msg) { els.status.textContent = msg || ''; }
  function normalizePath(path) { return String(path || '').replace(/\\+/g, '/').replace(/^\.\//, '').replace(/^\/+/, '').replace(/\/+/g, '/').trim(); }
  function cleanTargetPath(path) { const p = normalizePath(path); return p === '' ? '' : p.replace(/\/+$/, ''); }
  function joinPath(a, b) { const aa = cleanTargetPath(a); const bb = normalizePath(b); return aa ? (bb ? `${aa}/${bb}` : aa) : bb; }
  function isJunk(path) { return junkPatterns.some(re => re.test(path)); }
  function makeId() { return `p_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`; }
  function isAuthReady() { return !!(els.token.value.trim() && els.owner.value.trim() && els.repo.value.trim() && els.branch.value.trim()); }
  function isZipReady() { return !!(zip && preparedFiles.length); }
  function activeProfile() { return profiles.find(p => p.id === activeProfileId) || null; }

  function defaultProfile(name = '게시판 1') {
    return { id: makeId(), name, token: '', saveToken: false, owner: '', repo: '', branch: 'main', targetPath: '/' };
  }

  function sanitizeProfile(p) {
    return {
      id: String(p.id || makeId()), name: String(p.name || '이름 없는 게시판'), token: String(p.token || ''),
      saveToken: !!p.saveToken, owner: String(p.owner || ''), repo: String(p.repo || ''),
      branch: String(p.branch || 'main'), targetPath: String(p.targetPath || '/')
    };
  }

  function migrateLegacyProfile() {
    try {
      const token = localStorage.getItem('githubZipUploader.token.v3') || localStorage.getItem('githubZipUploader.token.v2') || localStorage.getItem('githubZipUploader.token.v1') || '';
      const raw = localStorage.getItem('githubZipUploader.settings.v3') || localStorage.getItem('githubZipUploader.settings.v2') || localStorage.getItem('githubZipUploader.settings.v1') || '{}';
      const s = JSON.parse(raw);
      if (!token && !s.owner && !s.repo) return null;
      return sanitizeProfile({ id: makeId(), name: '기존 게시판', token, saveToken: !!token, owner: s.owner, repo: s.repo, branch: s.branch, targetPath: s.targetPath });
    } catch (_) { return null; }
  }

  function loadProfiles() {
    try {
      const parsed = JSON.parse(localStorage.getItem(PROFILES_KEY) || '[]');
      profiles = Array.isArray(parsed) ? parsed.map(sanitizeProfile) : [];
    } catch (_) { profiles = []; }
    if (!profiles.length) {
      const legacy = migrateLegacyProfile();
      profiles = [legacy || defaultProfile()];
    }
    const savedActive = localStorage.getItem(ACTIVE_PROFILE_KEY);
    activeProfileId = profiles.some(p => p.id === savedActive) ? savedActive : profiles[0].id;
    persistProfiles();
    renderProfiles();
    loadProfileToForm(activeProfileId);
  }

  function persistProfiles() {
    localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
    localStorage.setItem(ACTIVE_PROFILE_KEY, activeProfileId);
  }

  function renderProfiles() {
    els.profileSelect.innerHTML = '';
    profiles.forEach(p => {
      const option = document.createElement('option');
      option.value = p.id; option.textContent = p.name;
      if (p.id === activeProfileId) option.selected = true;
      els.profileSelect.appendChild(option);
    });
    els.profileBadge.textContent = `${profiles.length}개`;
    els.profileBadge.className = 'badge ok';
    els.deleteProfileBtn.disabled = busy || profiles.length <= 1;
  }

  function formProfileSnapshot(includeUnsavedToken = true) {
    return sanitizeProfile({
      id: activeProfileId || makeId(), name: els.profileName.value.trim() || '이름 없는 게시판',
      token: includeUnsavedToken ? els.token.value.trim() : '', saveToken: els.saveToken.checked,
      owner: els.owner.value.trim(), repo: els.repo.value.trim(), branch: els.branch.value.trim() || 'main', targetPath: els.targetPath.value.trim() || '/'
    });
  }

  function loadProfileToForm(id) {
    const p = profiles.find(item => item.id === id) || profiles[0];
    if (!p) return;
    activeProfileId = p.id;
    els.profileSelect.value = p.id;
    els.profileName.value = p.name;
    els.token.value = p.saveToken ? p.token : '';
    els.saveToken.checked = !!p.saveToken;
    els.owner.value = p.owner;
    els.repo.value = p.repo;
    els.branch.value = p.branch || 'main';
    els.targetPath.value = p.targetPath || '/';
    els.localSaveText.textContent = p.saveToken && p.token ? '이 게시판의 토큰이 이 기기에 저장되어 있습니다.' : '이 게시판의 토큰은 저장되어 있지 않습니다.';
    localStorage.setItem(ACTIVE_PROFILE_KEY, activeProfileId);
    invalidatePreview();
    updateUiState();
  }

  function saveCurrentProfile(showToast = true) {
    const index = profiles.findIndex(p => p.id === activeProfileId);
    const snapshot = formProfileSnapshot(true);
    snapshot.token = snapshot.saveToken ? snapshot.token : '';
    if (index >= 0) profiles[index] = snapshot; else profiles.push(snapshot);
    activeProfileId = snapshot.id;
    persistProfiles();
    renderProfiles();
    if (showToast) toast('게시판 설정 저장 완료');
    els.localSaveText.textContent = snapshot.saveToken && snapshot.token ? '게시판 설정과 토큰을 저장했습니다.' : '게시판 설정만 저장했습니다. 토큰은 저장하지 않았습니다.';
    updateUiState();
  }

  function addProfile(copyCurrent = false) {
    if (busy) return;
    saveCurrentProfile(false);
    const base = copyCurrent ? formProfileSnapshot(true) : defaultProfile();
    const p = sanitizeProfile({ ...base, id: makeId(), name: copyCurrent ? `${base.name} 복사본` : `게시판 ${profiles.length + 1}` });
    if (!copyCurrent) { p.token = ''; p.saveToken = false; p.owner = ''; p.repo = ''; p.branch = 'main'; p.targetPath = '/'; }
    profiles.push(p); activeProfileId = p.id; persistProfiles(); renderProfiles(); loadProfileToForm(p.id);
    toast(copyCurrent ? '게시판 복제 완료' : '새 게시판 추가 완료');
  }

  function deleteCurrentProfile() {
    if (busy || profiles.length <= 1) return;
    const current = activeProfile();
    if (!current) return;
    if (!confirm(`“${current.name}” 게시판 설정을 삭제할까요?`)) return;
    profiles = profiles.filter(p => p.id !== current.id);
    activeProfileId = profiles[0].id;
    persistProfiles(); renderProfiles(); loadProfileToForm(activeProfileId); toast('게시판 삭제 완료');
  }

  function clearCurrentToken() {
    els.token.value = ''; els.saveToken.checked = false;
    const p = activeProfile();
    if (p) { p.token = ''; p.saveToken = false; persistProfiles(); }
    els.localSaveText.textContent = '현재 게시판의 저장 토큰을 삭제했습니다.';
    toast('토큰 삭제 완료'); updateUiState();
  }

  function invalidatePreview() {
    if (busy) return;
    previewDone = false; completed = false; remoteTree = null;
    preparedFiles.forEach(f => f.status = '대기');
  }

  function setFormDisabled(value) {
    [els.profileSelect, els.profileName, els.newProfileBtn, els.saveProfileBtn, els.duplicateProfileBtn, els.deleteProfileBtn,
     els.token, els.saveToken, els.saveLocalBtn, els.clearTokenBtn, els.owner, els.repo, els.branch, els.targetPath,
     els.pickFileBtn, els.clearJobBtn].forEach(el => { el.disabled = !!value; });
    if (!value) els.deleteProfileBtn.disabled = profiles.length <= 1;
  }

  function renderCounter() {
    const total = preparedFiles.length;
    if (!total) {
      els.fileCountText.className = 'count-text hidden';
      els.progressTrack.classList.add('hidden');
      els.progressBar.style.width = '0%';
      return;
    }
    const pct = total ? Math.round((uploadedCount / total) * 100) : 0;
    els.fileCountText.classList.remove('hidden');
    els.progressTrack.classList.toggle('hidden', uploadedCount === 0 && !busy && !completed);
    els.progressBar.style.width = `${Math.max(0, Math.min(100, pct))}%`;
    if (completed) {
      els.fileCountText.textContent = `압축파일 ${total}개 파일 업로드 완료`;
      els.fileCountText.className = 'count-text ok';
    } else if (uploadedCount > 0) {
      els.fileCountText.textContent = `총 ${total}개 중 ${uploadedCount}개 처리됨 · ${pct}%`;
      els.fileCountText.className = 'count-text blue';
    } else {
      els.fileCountText.textContent = `업로드 대상 ${total}개 파일`;
      els.fileCountText.className = 'count-text ok';
    }
  }

  function updateUiState() {
    const auth = isAuthReady(); const zipReady = isZipReady();
    els.uploadBtn.disabled = busy || !(auth && zipReady);
    els.uploadBtn.textContent = busy ? `업로드 중 ${uploadedCount}/${preparedFiles.length}` : (uploadedCount > 0 && !completed ? '업로드 계속' : '업로드');
    els.tokenBadge.textContent = auth ? '준비 완료' : '설정 필요';
    els.tokenBadge.className = `badge ${auth ? 'ok' : 'warn'}`;
    els.zipBadge.textContent = zipReady ? `${preparedFiles.length}개` : '대기';
    els.zipBadge.className = `badge ${zipReady ? 'ok' : ''}`;
    els.previewBadge.textContent = previewDone ? '변경 확인' : '변경 미확인';
    els.previewBadge.className = `badge ${previewDone ? 'ok' : 'warn'}`;
    els.uploadBadge.textContent = completed ? '업로드 완료' : (busy || uploadedCount > 0 ? '업로드 중' : (auth && zipReady ? '준비 완료' : '준비 전'));
    els.uploadBadge.className = `badge ${completed ? 'ok' : (busy || uploadedCount > 0 || (auth && zipReady) ? 'blue' : 'warn')}`;
    renderCounter(); renderProfiles();
    if (!busy) {
      if (!auth) setStatus('현재 게시판 설정 필요');
      else if (!zipReady) setStatus('압축파일 선택 필요');
      else if (completed) setStatus('업로드 완료');
      else if (uploadedCount > 0) setStatus('중단된 업로드를 이어서 진행할 수 있습니다.');
      else setStatus('업로드 준비 완료');
    }
  }

  function setBusy(value, msg) { busy = value; if (msg) setStatus(msg); setFormDisabled(value); updateUiState(); }

  function openDb() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      if (!('indexedDB' in window)) return reject(new Error('이 브라우저는 업로드 복구 저장소를 지원하지 않습니다.'));
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath: 'id' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('복구 저장소를 열지 못했습니다.'));
    });
    return dbPromise;
  }

  async function dbPut(value) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(value);
      tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error); tx.onabort = () => reject(tx.error);
    });
  }

  async function dbGet(id) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null); req.onerror = () => reject(req.error);
    });
  }

  async function dbDelete(id) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readwrite'); tx.objectStore(DB_STORE).delete(id);
      tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error);
    });
  }

  function jobRecord(extra = {}) {
    const profile = formProfileSnapshot(false);
    return {
      id: ACTIVE_JOB_ID, version: 4, fileName: zipFileName, zipBlob, profileId: activeProfileId,
      profileSnapshot: { name: profile.name, owner: profile.owner, repo: profile.repo, branch: profile.branch, targetPath: profile.targetPath },
      blobShas, uploadedCount, total: preparedFiles.length, previewDone, completed, status: jobStatus,
      updatedAt: Date.now(), ...extra
    };
  }

  async function persistJob(extra = {}, quiet = true) {
    if (!zipBlob) return;
    try { await dbPut(jobRecord(extra)); }
    catch (err) {
      if (!quiet) toast(`복구 기록 저장 실패: ${err.message}`);
      console.warn('[ZIP 업로더] 복구 기록 저장 실패', err);
    }
  }

  async function clearJob(showToast = true) {
    if (busy) return;
    try { await dbDelete(ACTIVE_JOB_ID); } catch (_) {}
    zip = null; zipBlob = null; zipFileName = ''; rawEntries = []; preparedFiles = []; remoteTree = null;
    previewDone = false; completed = false; uploadedCount = 0; blobShas = {}; jobStatus = 'none'; autoResumeRequested = false;
    els.zipFile.value = ''; els.fileInfo.textContent = 'ZIP 내부의 폴더와 파일 경로를 그대로 유지합니다.';
    updateUiState(); if (showToast) toast('업로드 작업 초기화 완료');
  }

  async function restoreJob() {
    try {
      const saved = await dbGet(ACTIVE_JOB_ID);
      if (!saved || !saved.zipBlob || saved.completed) {
        if (saved && saved.completed) await dbDelete(ACTIVE_JOB_ID);
        return false;
      }
      const matching = profiles.find(p => p.id === saved.profileId);
      if (matching) {
        loadProfileToForm(matching.id);
        if (saved.profileSnapshot) {
          els.profileName.value = saved.profileSnapshot.name || matching.name;
          els.owner.value = saved.profileSnapshot.owner || '';
          els.repo.value = saved.profileSnapshot.repo || '';
          els.branch.value = saved.profileSnapshot.branch || 'main';
          els.targetPath.value = saved.profileSnapshot.targetPath || '/';
        }
      } else if (saved.profileSnapshot) {
        const p = defaultProfile(saved.profileSnapshot.name || '복구 게시판');
        Object.assign(p, saved.profileSnapshot); profiles.push(p); activeProfileId = p.id; persistProfiles(); renderProfiles(); loadProfileToForm(p.id);
      }
      zipBlob = saved.zipBlob; zipFileName = saved.fileName || '복구된 파일.zip';
      blobShas = saved.blobShas || {}; uploadedCount = Number(saved.uploadedCount || Object.keys(blobShas).length || 0);
      jobStatus = saved.status || 'ready'; previewDone = !!saved.previewDone; completed = false;
      await loadZipBlob(zipBlob, zipFileName, false);
      uploadedCount = Math.min(preparedFiles.length, Number(saved.uploadedCount || Object.keys(blobShas).length || 0));
      els.fileInfo.textContent = `${zipFileName} · 중단 기록 복구됨`;
      autoResumeRequested = saved.status === 'uploading';
      setStatus(autoResumeRequested ? '중단된 업로드 복구 완료 · 자동 재개 준비' : '업로드 작업 복구 완료');
      updateUiState();
      return true;
    } catch (err) {
      console.warn('[ZIP 업로더] 복구 실패', err);
      setStatus('복구 기록을 불러오지 못했습니다.');
      return false;
    }
  }

  function isUnsafeZipPath(path) {
    return normalizePath(path).split('/').filter(Boolean).some(part => part === '.' || part === '..');
  }

  function prepareFilesKeepingZipPaths() {
    const map = new Map();
    for (const f of rawEntries) {
      const rel = normalizePath(f.path);
      if (!rel || isJunk(rel)) continue;
      if (isUnsafeZipPath(rel)) throw new Error(`안전하지 않은 ZIP 경로가 있습니다: ${rel}`);
      map.set(rel, { relativePath: rel, zipPath: f.path, entry: f.entry, size: f.size, status: '대기' });
    }
    preparedFiles = Array.from(map.values()).sort((a,b) => a.relativePath.localeCompare(b));
    if (!preparedFiles.length) throw new Error('ZIP 안에서 업로드 가능한 파일을 찾지 못했습니다.');
  }

  async function loadZipBlob(blob, name, persist = true) {
    if (!window.JSZip) throw new Error('JSZip을 불러오지 못했습니다. 인터넷 연결을 확인하세요.');
    zip = await JSZip.loadAsync(blob); rawEntries = [];
    zip.forEach((relativePath, entry) => {
      const path = normalizePath(relativePath);
      if (!path || entry.dir || isJunk(path)) return;
      rawEntries.push({ path, entry, size: entry._data && entry._data.uncompressedSize ? entry._data.uncompressedSize : 0 });
    });
    prepareFilesKeepingZipPaths();
    if (persist) {
      zipBlob = blob; zipFileName = name || 'upload.zip'; blobShas = {}; uploadedCount = 0; completed = false; previewDone = false; remoteTree = null; jobStatus = 'ready';
      await persistJob({}, false);
    }
    els.fileInfo.textContent = `${name || 'ZIP 파일'} · ${preparedFiles.length}개 파일`;
    updateUiState();
  }

  async function readZipFile(file) {
    if (!file) return;
    if (zipBlob && !completed && preparedFiles.length && !confirm('기존 업로드 작업을 새 ZIP 파일로 교체할까요?')) return;
    await loadZipBlob(file, file.name, true);
    setStatus(`${preparedFiles.length}개 파일 분석 완료`); toast('ZIP 분석 및 복구 저장 완료');
  }

  async function gh(path, options = {}) {
    const token = els.token.value.trim();
    const res = await fetch(`${API}${path}`, {
      ...options,
      headers: { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', 'Authorization': `Bearer ${token}`, ...(options.headers || {}) }
    });
    const text = await res.text(); let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (_) { data = { raw: text }; }
    if (!res.ok) {
      const message = data && data.message ? data.message : res.statusText;
      if (res.status === 401) throw new Error('401 인증 실패: 현재 게시판 토큰이 잘못됐거나 만료됐습니다.');
      if (res.status === 403) throw new Error('403 권한 부족: 토큰의 저장소 Contents 읽기/쓰기 권한을 확인하세요.');
      if (res.status === 404) throw new Error('404 저장소 또는 브랜치를 찾지 못했습니다.');
      throw new Error(`GitHub API 오류 ${res.status}: ${message}`);
    }
    return data;
  }

  function repoPath(extra) { return `/repos/${encodeURIComponent(els.owner.value.trim())}/${encodeURIComponent(els.repo.value.trim())}${extra}`; }

  async function fetchRemoteTree() {
    const branch = encodeURIComponent(els.branch.value.trim());
    const ref = await gh(repoPath(`/git/ref/heads/${branch}`));
    const headSha = ref.object.sha;
    const commit = await gh(repoPath(`/git/commits/${headSha}`));
    const baseTreeSha = commit.tree.sha;
    const tree = await gh(repoPath(`/git/trees/${baseTreeSha}?recursive=1`));
    return { headSha, baseTreeSha, tree: tree.tree || [] };
  }

  async function previewChanges(quiet = false) {
    if (!preparedFiles.length) throw new Error('먼저 압축파일을 선택하세요.');
    if (!isAuthReady()) throw new Error('현재 게시판 설정을 먼저 입력하세요.');
    setBusy(true, 'GitHub 파일 비교 중');
    remoteTree = await fetchRemoteTree();
    const target = cleanTargetPath(els.targetPath.value);
    const remoteFiles = new Set(remoteTree.tree.filter(item => item.type === 'blob').map(item => item.path));
    let add = 0, modify = 0;
    for (const f of preparedFiles) {
      const finalPath = joinPath(target, f.relativePath);
      if (remoteFiles.has(finalPath)) { f.status = '수정'; modify++; } else { f.status = '추가'; add++; }
    }
    previewDone = true; completed = false; jobStatus = 'ready';
    await persistJob();
    setStatus(`변경 확인 완료: 추가 ${add}개, 수정 ${modify}개`);
    if (!quiet) toast('변경 확인 완료');
    setBusy(false);
  }

  async function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer); const chunkSize = 0x8000; let binary = '';
    for (let i = 0; i < bytes.length; i += chunkSize) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    return btoa(binary);
  }

  async function createBlobForFile(file) {
    const buffer = await file.entry.async('arraybuffer');
    const base64 = await arrayBufferToBase64(buffer);
    const blob = await gh(repoPath('/git/blobs'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: base64, encoding: 'base64' }) });
    return blob.sha;
  }

  function buildPagesUrl() {
    const owner = els.owner.value.trim(); const repo = els.repo.value.trim(); const target = cleanTargetPath(els.targetPath.value);
    let base = repo.toLowerCase() === `${owner.toLowerCase()}.github.io` ? `https://${owner}.github.io/` : `https://${owner}.github.io/${repo}/`;
    if (target) base += `${target}/`;
    return base.replace(/([^:]\/)\/+/g, '$1');
  }

  async function requestWakeLock() {
    try { if ('wakeLock' in navigator && !wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
  }

  async function releaseWakeLock() {
    try { if (wakeLock) await wakeLock.release(); } catch (_) {} finally { wakeLock = null; }
  }

  async function uploadToGitHub() {
    if (!isZipReady()) throw new Error('먼저 압축파일을 선택하세요.');
    if (!isAuthReady()) throw new Error('현재 게시판 설정을 먼저 입력하세요.');
    saveCurrentProfile(false);
    if (!previewDone) await previewChanges(true);

    setBusy(true, 'GitHub 업로드 준비 중');
    await requestWakeLock();
    jobStatus = 'uploading'; completed = false;
    await persistJob({ status: 'uploading' }, false);

    const target = cleanTargetPath(els.targetPath.value);
    const total = preparedFiles.length;
    const treeItems = [];

    for (let i = 0; i < total; i++) {
      const f = preparedFiles[i];
      const finalPath = joinPath(target, f.relativePath);
      let sha = blobShas[finalPath];
      if (!sha) {
        setStatus(`파일 전송 중: ${i + 1}/${total}`);
        sha = await createBlobForFile(f);
        blobShas[finalPath] = sha;
      }
      treeItems.push({ path: finalPath, mode: '100644', type: 'blob', sha });
      uploadedCount = Object.keys(blobShas).filter(path => preparedFiles.some(file => joinPath(target, file.relativePath) === path)).length;
      updateUiState();
      await persistJob({ status: 'uploading' });
    }

    if (treeItems.length !== total) throw new Error(`업로드 수량 불일치: 압축파일 ${total}개 / 준비 ${treeItems.length}개`);

    setStatus('최신 브랜치 상태 확인 중');
    const base = await fetchRemoteTree();
    setStatus('Git Tree 생성 중');
    const newTree = await gh(repoPath('/git/trees'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ base_tree: base.baseTreeSha, tree: treeItems }) });
    setStatus('업로드 기록 생성 중');
    const newCommit = await gh(repoPath('/git/commits'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: DEFAULT_UPLOAD_MESSAGE, tree: newTree.sha, parents: [base.headSha] }) });
    setStatus('브랜치 반영 중');
    await gh(repoPath(`/git/refs/heads/${encodeURIComponent(els.branch.value.trim())}`), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sha: newCommit.sha, force: false }) });

    completed = true; previewDone = true; jobStatus = 'completed'; uploadedCount = total;
    await persistJob({ status: 'completed', completed: true, commitSha: newCommit.sha });
    await dbDelete(ACTIVE_JOB_ID);
    setStatus(`업로드 완료: ${buildPagesUrl()}`); toast('업로드 완료');
    await releaseWakeLock();
    setBusy(false);
  }

  async function handleZipChange() {
    try { const file = els.zipFile.files[0]; if (!file) return; setBusy(true, 'ZIP 분석 및 저장 중'); await readZipFile(file); }
    catch (err) { setStatus(`오류: ${err.message}`); toast(err.message); }
    finally { setBusy(false); }
  }

  async function handleUpload() {
    try { await uploadToGitHub(); }
    catch (err) {
      completed = false; jobStatus = 'error';
      await persistJob({ status: 'error', lastError: err.message });
      setStatus(`오류: ${err.message}`); toast(err.message); updateUiState();
      await releaseWakeLock(); setBusy(false);
    }
  }

  function handleProfileFieldChange() {
    if (busy) return;
    invalidatePreview(); updateUiState();
  }

  els.pickFileBtn.addEventListener('click', () => { if (!busy) { els.zipFile.value = ''; els.zipFile.click(); } });
  els.zipFile.addEventListener('change', handleZipChange);
  els.uploadBtn.addEventListener('click', handleUpload);
  els.clearJobBtn.addEventListener('click', () => clearJob(true));
  els.saveProfileBtn.addEventListener('click', () => saveCurrentProfile(true));
  els.saveLocalBtn.addEventListener('click', () => saveCurrentProfile(true));
  els.newProfileBtn.addEventListener('click', () => addProfile(false));
  els.duplicateProfileBtn.addEventListener('click', () => addProfile(true));
  els.deleteProfileBtn.addEventListener('click', deleteCurrentProfile);
  els.clearTokenBtn.addEventListener('click', clearCurrentToken);
  els.profileSelect.addEventListener('change', () => {
    if (busy) return;
    const nextProfileId = els.profileSelect.value;
    saveCurrentProfile(false);
    activeProfileId = nextProfileId;
    loadProfileToForm(activeProfileId);
  });
  ['input','change'].forEach(evt => [els.profileName, els.token, els.saveToken, els.owner, els.repo, els.branch, els.targetPath].forEach(el => el.addEventListener(evt, handleProfileFieldChange)));

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'hidden') await persistJob({ status: busy ? 'uploading' : jobStatus });
    else if (busy) await requestWakeLock();
  });
  window.addEventListener('pagehide', () => { persistJob({ status: busy ? 'uploading' : jobStatus }); });
  window.addEventListener('beforeunload', event => {
    if (!busy) return;
    event.preventDefault(); event.returnValue = '';
  });

  (async function init() {
    loadProfiles();
    const restored = await restoreJob();
    updateUiState();
    if (!restored) setStatus(isAuthReady() ? '압축파일 선택 필요' : '현재 게시판 설정 필요');
    if (autoResumeRequested && isAuthReady() && isZipReady()) {
      setTimeout(() => { if (!busy) handleUpload(); }, 350);
    }
  })();
})();
</script>
</body>
</html>
